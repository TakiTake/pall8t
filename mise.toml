# Dev tools for pall8t (https://mise.jdx.dev)
# Note: apple/container itself is a system service (installer pkg + launchd),
# not manageable via mise — install from https://github.com/apple/container/releases

[tools]
rust = "1.96"

[tasks.check]
description = "Type-check without building"
run = "cargo check"

[tasks.build]
description = "Release build"
run = "cargo build --release"

[tasks.install]
description = "Install pall8t to ~/.cargo/bin"
run = "cargo install --path ."

[tasks.lint]
description = "rustfmt + clippy (-D warnings) across every supported target"
run = "./scripts/lint.sh"

[tasks.setup-hooks]
description = "Enable the repo's git hooks (pre-commit lint gate)"
run = "git config core.hooksPath .githooks"
