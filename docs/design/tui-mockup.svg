<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">
  <title>pall8t TUI mockup</title>
  <desc>Three areas: project list (left), file tree and preview (right), status line and keybar (bottom).</desc>
  <defs>
    <clipPath id="frame"><rect x="0.5" y="0.5" width="679" height="399" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="680" height="400" fill="#16161e"/>
    <rect x="0" y="0" width="680" height="30" fill="#1a1b26"/>
    <circle cx="20" cy="15" r="5.5" fill="#f7768e"/>
    <circle cx="37" cy="15" r="5.5" fill="#e0af68"/>
    <circle cx="54" cy="15" r="5.5" fill="#9ece6a"/>
    <text x="70" y="19" fill="#565f89" font-size="12">pall8t</text>
    <line x1="0" y1="30" x2="680" y2="30" stroke="#2a2c3d"/>

    <line x1="190" y1="30" x2="190" y2="325" stroke="#2a2c3d"/>
    <text x="12" y="50" fill="#7aa2f7" font-size="11" letter-spacing="1">PROJECTS ── focus</text>
    <rect x="1" y="60" width="189" height="20" fill="#283457"/>
    <text x="12" y="74" fill="#c0caf5">▸ myapp</text>
    <text x="180" y="74" fill="#9ece6a" text-anchor="end">● running</text>
    <text x="26" y="96" fill="#787c99">blog</text>
    <text x="180" y="96" fill="#787c99" text-anchor="end">○ stopped</text>
    <text x="26" y="118" fill="#565f89">infra</text>
    <text x="180" y="118" fill="#565f89" text-anchor="end">· absent</text>

    <text x="202" y="50" fill="#565f89" font-size="11" letter-spacing="1">FILES&#160;&#160;~/src/myapp</text>
    <text x="202" y="74" fill="#7aa2f7">▸ src/</text>
    <rect x="191" y="80" width="489" height="20" fill="#1f2335"/>
    <text x="218" y="94" fill="#c0caf5">main.rs</text>
    <text x="218" y="116" fill="#c0caf5">lib.rs</text>
    <text x="202" y="138" fill="#e0af68">Cargo.toml</text>
    <text x="202" y="160" fill="#565f89">.pall8t/</text>

    <line x1="190" y1="178" x2="680" y2="178" stroke="#2a2c3d"/>
    <text x="202" y="198" fill="#565f89" font-size="11" letter-spacing="1">PREVIEW&#160;&#160;Cargo.toml</text>
    <text x="202" y="222" fill="#bb9af7">[package]</text>
    <text x="202" y="244" fill="#787c99">name = <tspan fill="#9ece6a">"myapp"</tspan></text>
    <text x="202" y="266" fill="#787c99">version = <tspan fill="#9ece6a">"0.1.0"</tspan></text>
    <text x="202" y="288" fill="#787c99">edition = <tspan fill="#9ece6a">"2024"</tspan></text>

    <line x1="0" y1="325" x2="680" y2="325" stroke="#2a2c3d"/>
    <text x="12" y="345" fill="#787c99">myapp: <tspan fill="#9ece6a">running</tspan> (pall8t-myapp-3fa9c21b)&#160;&#160;cpu 4&#160;&#160;mem 4G</text>

    <rect x="0" y="358" width="680" height="42" fill="#1a1b26"/>
    <line x1="0" y1="358" x2="680" y2="358" stroke="#2a2c3d"/>
    <text x="12" y="383" font-size="12" fill="#565f89"><tspan fill="#7aa2f7">⏎</tspan> shell tab&#160;&#160;&#160;<tspan fill="#7aa2f7">c</tspan> claude tab&#160;&#160;&#160;<tspan fill="#7aa2f7">s</tspan> start/stop&#160;&#160;&#160;<tspan fill="#7aa2f7">b</tspan> build image&#160;&#160;&#160;<tspan fill="#7aa2f7">a</tspan> add&#160;&#160;&#160;<tspan fill="#7aa2f7">Tab</tspan> focus&#160;&#160;&#160;<tspan fill="#7aa2f7">q</tspan> quit</text>
  </g>
  <rect x="0.5" y="0.5" width="679" height="399" rx="10" fill="none" stroke="#2a2c3d"/>
</svg>
